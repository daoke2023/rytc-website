<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYTC | 顶级生态公链平台+链上聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#050816;color:#eef2ff;padding:20px;background:radial-gradient(circle at 50% 0%,#101836 0%,#050816 60%);min-height:100vh;}
        .container{max-width:480px;margin:0 auto;}
        .head-box{text-align:center;padding:20px 0;margin-bottom:20px;}
        .logo{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#06b6d4);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#fff;box-shadow:0 0 25px rgba(59,130,246,0.4);}
        .desc{font-size:14px;color:#94a3b8;line-height:1.6;}
        .card{background:rgba(20,28,48,0.7);border:1px solid rgba(80,140,255,0.2);border-radius:16px;padding:24px;margin-bottom:20px;backdrop-filter:blur(10px);}
        .card h3{color:#60a5fa;margin-bottom:16px;font-size:18px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
        .data-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(80,140,255,0.15);font-size:14px;}
        .c1{color:#4ade80;}
        .c2{color:#facc15;}
        .c3{color:#fb7185;}
        .c4{color:#a78bfa;}
        .c5{color:#22d3ee;}
        input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(80,140,255,0.25);border-radius:10px;padding:12px 16px;color:#fff;margin:8px 0;outline:none;}
        button{width:100%;padding:13px;margin:7px 0;border-radius:10px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:15px;cursor:pointer;transition:0.25s;}
        button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,0.3);}
        .admin-card{border:1px solid rgba(251,191,36,0.3);background:rgba(30,26,10,0.6);}
        .addr-text{font-size:13px;color:#94a3b8;word-break:break-all;}

        /* 聊天模块样式 适配深色主题 */
        .chat-wrap{margin-top:30px;}
        .chat-container{display:flex;width:100%;height:600px;border-radius:16px;overflow:hidden;background:rgba(20,28,48,0.7);border:1px solid rgba(80,140,255,0.2);}
        .chat-sidebar{width:140px;background:#141c30;color:#fff;}
        .chat-tab{display:flex;border-bottom:1px solid #2a3452;}
        .chat-tab-item{flex:1;text-align:center;padding:10px;font-size:13px;cursor:pointer;}
        .chat-tab-item.active{background:#2563eb;}
        .session-list{height:480px;overflow-y:auto;}
        .session-item{padding:10px;border-bottom:1px solid #2a3452;font-size:12px;cursor:pointer;}
        .session-item.active{background:#1e2948;}
        .chat-main{flex:1;display:flex;flex-direction:column;}
        .chat-head{height:45px;line-height:45px;padding:0 15px;border-bottom:1px solid #2a3452;font-size:15px;}
        .chat-content{flex:1;padding:10px;overflow-y:auto;background:#0f1629;}
        .msg-row{margin:8px 0;display:flex;}
        .msg-self{justify-content:flex-end;}
        .msg-box{max-width:70%;padding:8px 12px;border-radius:6px;font-size:13px;}
        .msg-other{background:#232e4a;border:1px solid #3b82f6;color:#eef2ff;}
        .msg-self-box{background:#2563eb;color:#fff;}
        .msg-time{font-size:10px;color:#94a3b8;margin-top:3px;text-align:right;}
        .redpacket-tip{color:#fb7185;font-weight:bold;}
        .chat-input-area{height:80px;border-top:1px solid #2a3452;padding:10px;}
        .chat-text{width:100%;height:45px;background:rgba(255,255,255,0.08);border:1px solid rgba(80,140,255,0.25);border-radius:8px;padding:8px;color:#fff;resize:none;outline:none;}
        .chat-btn-row{display:flex;gap:8px;margin-top:5px;}
        .mini-btn{flex:1;padding:6px;border-radius:6px;border:none;background:#2563eb;color:#fff;font-size:12px;cursor:pointer;}
        .red-btn{background:#be123c;}
        .chat-func{width:120px;border-left:1px solid #2a3452;padding:10px;overflow-y:auto;}
        .func-small-title{font-size:12px;color:#60a5fa;margin:8px 0;}
        .small-input{padding:6px;font-size:11px;margin:4px 0;}
        .small-btn{padding:5px;font-size:11px;margin:3px 0;}
    </style>
</head>
<body>
<div class="container">
    <div class="head-box">
        <div class="logo">RYTC</div>
        <h2>RYTC 全球生态公链平台</h2>
        <p class="desc">Polygon公链 | 持币生息·七档质押·两级分销·200公会体系<br>链上公开透明 · 全自动智能合约结算</p >
    </div>

    <!-- 原有理财系统 完整保留 -->
    <div class="card">
        <h3>📊 个人六项收益总览</h3>
        <button onclick="connectWallet()">连接MetaMask钱包</button>
        <p class="addr-text" id="walletAddr">未连接</p >
        <div class="data-row"><span>💰钱包本金</span><span id="bal">0.00</span></div>
        <div class="data-row c1"><span>💎持币生息收益</span><span id="holdRew">0.00</span></div>
        <div class="data-row c2"><span>⚙️质押挖矿收益</span><span id="stakeRew">0.00</span></div>
        <div class="data-row c3"><span>👥一级直推奖励</span><span id="dirRew">0.00</span></div>
        <div class="data-row c4"><span>🏆团队业绩奖励</span><span id="teamRew">0.00</span></div>
        <div class="data-row c5"><span>🛡️个人公会分红</span><span id="guildRew">0.00</span></div>
    </div>

    <div class="card">
        <h3>🛡️ 200公会专区</h3>
        <input type="number" id="gid" placeholder="输入公会ID 1-200">
        <button onclick="joinGuild()">加入对应公会</button>
        <div class="data-row"><span>当前所属公会</span><span id="myGuild">无</span></div>
    </div>

    <div class="card">
        <h3>💰 代币预售认购</h3>
        <input type="text" id="up" placeholder="上级钱包地址">
        <input type="number" id="buyNum" placeholder="认购数量">
        <button onclick="buyMatic()">MATIC购买</button>
        <button onclick="buyUSDT()">USDT购买</button>
        <button onclick="buyUSDC()">USDC购买</button>
    </div>

    <div class="card">
        <h3>💎 持币生息</h3>
        <button onclick="claimHold()">一键领取持仓收益</button>
    </div>

    <div class="card">
        <h3>⚙️ 七档周期质押</h3>
        <input type="number" id="stakeNum" placeholder="质押数量">
        <input type="number" id="lv" placeholder="档位0-6">
        <button onclick="doStake()">确认质押</button>
        <input type="number" id="unIdx" placeholder="质押订单序号">
        <button onclick="unStake()">到期解质押</button>
    </div>

    <div class="card admin-card">
        <h3>🔐 项目方超级后台</h3>
        <input type="number" id="hRate" placeholder="修改持币日息">
        <button onclick="editHoldRate()">修改持币日息</button>
    </div>

    <!-- 新增：链上聊天模块 -->
    <div class="chat-wrap">
        <div class="card">
            <h3>💬 链上社群聊天 · 红包转账互通</h3>
            <div class="chat-container">
                <div class="chat-sidebar">
                    <div class="chat-tab">
                        <div class="chat-tab-item active" data-type="private">私聊</div>
                        <div class="chat-tab-item" data-type="group">群聊</div>
                    </div>
                    <div class="session-list" id="sessionList"></div>
                </div>
                <div class="chat-main">
                    <div class="chat-head" id="chatTitle">选择会话开始聊天</div>
                    <div class="chat-content" id="chatBox"></div>
                    <div class="chat-input-area">
                        <textarea class="chat-text" id="msgInput" placeholder="输入消息"></textarea>
                        <div class="chat-btn-row">
                            <button class="mini-btn" id="sendMsgBtn">发送消息</button>
                            <button class="mini-btn red-btn" id="sendRedBtn">私聊红包</button>
                        </div>
                    </div>
                </div>
                <div class="chat-func">
                    <div class="func-small-title">添加好友</div>
                    <input class="small-input" type="text" id="friendAddr" placeholder="钱包地址">
                    <button class="small-btn mini-btn" id="addFriendBtn">添加</button>

                    <div class="func-small-title">代币转账</div>
                    <input class="small-input" type="text" id="transferAddr" placeholder="对方地址">
                    <input class="small-input" type="number" id="transferNum" placeholder="数量">
                    <button class="small-btn mini-btn" id="transferBtn">转账</button>

                    <div class="func-small-title">群红包</div>
                    <input class="small-input" type="number" id="redTotal" placeholder="总额">
                    <input class="small-input" type="number" id="redCount" placeholder="个数">
                    <button class="small-btn mini-btn red-btn" id="sendGroupRedBtn">发红包</button>

                    <div class="func-small-title">建群管理</div>
                    <input class="small-input" type="text" id="newGroupName" placeholder="群名称">
                    <button class="small-btn mini-btn" id="createGroupBtn">建群</button>
                    <input class="small-input" type="number" id="manageGid" placeholder="群ID">
                    <input class="small-input" type="text" id="operateUserAddr" placeholder="成员地址">
                    <div style="display:flex;gap:3px;">
                        <button class="small-btn mini-btn" id="inviteUserBtn">邀请</button>
                        <button class="small-btn mini-btn" id="kickUserBtn">踢出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ========= 理财合约地址 自行替换 =========
const RYTC = "你的RYTC合约";
const PRESALE = "你的预售合约";
const STAKE = "你的质押合约";
const GUILD = "你的公会合约";

// ========= 聊天合约地址 自行替换 =========
const TOKEN_ADDR = "你的RYTC合约";
const GROUP_ADDR = "你的聊天群组合约";
const BUY_ADDR = "你的兑换合约";

const CHAINID = 137;
let web3,acc;
let provider,signer,userAddress;

// ===================== 原有理财钱包逻辑 =====================
async function connectWallet(){
    if(!window.ethereum)return alert("安装小狐狸钱包");
    await window.ethereum.request({method:'eth_requestAccounts'});
    web3=new Web3(window.ethereum);
    let c=await web3.eth.getChainId();
    if(c!=CHAINID){alert("切换Polygon主网");return;}
    acc=(await web3.eth.getAccounts())[0];
    document.getElementById("walletAddr").innerText=acc;

    // 同步给聊天系统钱包
    provider=new ethers.providers.Web3Provider(window.ethereum);
    signer=provider.getSigner();
    userAddress=acc;

    refreshAll();
    loadChatSession();
}

async function refreshAll(){
    let erc=new web3.eth.Contract(["function balanceOf(address)view returns(uint256)"],RYTC);
    let b=await erc.methods.balanceOf(acc).call();
    document.getElementById("bal").innerText=web3.utils.fromWei(b);

    let gCon=new web3.eth.Contract(["function userBindGuild(address)view returns(uint256)"],GUILD);
    let gid=await gCon.methods.userBindGuild(acc).call();
    document.getElementById("myGuild").innerText=gid||"无";
}

async function joinGuild(){
    let gid=document.getElementById("gid").value;
    let c=new web3.eth.Contract(["function joinGuild(uint256)"],GUILD);
    await c.methods.joinGuild(gid).send({from:acc});
    alert("加入公会成功");refreshAll();
}

async function claimHold(){
    let c=new web3.eth.Contract(["function claimHoldReward()"],RYTC);
    await c.methods.claimHoldReward().send({from:acc});
    alert("领取成功");refreshAll();
}

async function doStake(){
    let amt=web3.utils.toWei(document.getElementById("stakeNum").value);
    let lv=document.getElementById("lv").value;
    let c=new web3.eth.Contract(["function stake(uint256,uint256)"],STAKE);
    await c.methods.stake(amt,lv).send({from:acc});
    alert("质押成功");refreshAll();
}

async function unStake(){
    let idx=document.getElementById("unIdx").value;
    let c=new web3.eth.Contract(["function unStake(uint256)"],STAKE);
    await c.methods.unStake(idx).send({from:acc});
    alert("解质押成功");refreshAll();
}

function buyMatic(){}
function buyUSDT(){}
function buyUSDC(){}
function editHoldRate(){}

// ===================== 聊天系统逻辑 =====================
const TOKEN_ABI = [
    "function balanceOf(address) view returns(uint256)",
    "function transfer(address,uint256) returns(bool)",
    "function createRedPacket(uint256,uint256,bool,uint256) returns(bytes32)",
    "function claimRedPacket(bytes32) returns(uint256)"
];
const GROUP_ABI = [
    "function addFriend(address)",
    "function savePrivateChat(address,string)",
    "function createGroup(string) returns(uint256)",
    "function inviteMember(uint256,address)",
    "function kickMember(uint256,address)",
    "function sendGroupChat(uint256,string)",
    "function friends(address) view returns(address[])"
];
const BUY_ABI = ["function buyToken() payable"];

let currentChatType="private",currentChatTarget="",currentGroupId="";
let chatCache=JSON.parse(localStorage.getItem("rytcChatCache"))||{};

// 切换私聊群聊标签
document.querySelectorAll(".chat-tab-item").forEach(tab=>{
    tab.addEventListener("click",function(){
        document.querySelectorAll(".chat-tab-item").forEach(t=>t.classList.remove("active"));
        this.classList.add("active");
        currentChatType=this.dataset.type;
        loadChatSession();
    });
});

async function loadChatSession(){
    const list=document.getElementById("sessionList");
    list.innerHTML="";
    if(!userAddress)return;
    if(currentChatType==="private"){
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,provider);
        const fs=await group.friends(userAddress);
        fs.forEach(addr=>{
            const item=document.createElement("div");
            item.className="session-item";
            item.innerText=addr.slice(0,8)+"...";
            item.onclick=()=>openPrivateChat(addr);
            list.appendChild(item);
        });
    }else{
        const item=document.createElement("div");
        item.className="session-item";
        item.innerText="公共群聊";
        item.onclick=()=>openGroupChat(0,"公共群聊");
        list.appendChild(item);
    }
}

function openPrivateChat(addr){
    currentChatType="private";
    currentChatTarget=addr;
    currentGroupId="";
    document.getElementById("chatTitle").innerText=`私聊：${addr.slice(0,10)}`;
    document.getElementById("transferAddr").value=addr;
    loadChatMsgCache();
}
function openGroupChat(gid,name){
    currentChatType="group";
    currentChatTarget="";
    currentGroupId=gid;
    document.getElementById("chatTitle").innerText=`群聊：${name}`;
    loadChatMsgCache();
}

function saveChatCache(){
    localStorage.setItem("rytcChatCache",JSON.stringify(chatCache));
}
function loadChatMsgCache(){
    const key=currentChatType==="private"?currentChatTarget:`group_${currentGroupId}`;
    document.getElementById("chatBox").innerHTML=chatCache[key]||"";
}
function addChatMsg(isSelf,content,time){
    const key=currentChatType==="private"?currentChatTarget:`group_${currentGroupId}`;
    const row=document.createElement("div");
    row.className=`msg-row ${isSelf?'msg-self':''}`;
    row.innerHTML=`<div class="msg-box ${isSelf?'msg-self-box':'msg-other'}">${content}<div class="msg-time">${time}</div></div>`;
    document.getElementById("chatBox").appendChild(row);
    chatCache[key]=(chatCache[key]||"")+row.outerHTML;
    saveChatCache();
    document.getElementById("chatBox").scrollTop=document.getElementById("chatBox").scrollHeight;
}

// 发消息
document.getElementById("sendMsgBtn").addEventListener("click",async ()=>{
    const msg=document.getElementById("msgInput").value.trim();
    if(!msg||!userAddress)return;
    const time=new Date().toLocaleTimeString();
    addChatMsg(true,msg,time);
    document.getElementById("msgInput").value="";
    try{
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        currentChatType==="private"
            ?await group.savePrivateChat(currentChatTarget,msg)
            :await group.sendGroupChat(currentGroupId,msg);
    }catch(e){alert("消息发送失败");}
});

// 私聊红包
document.getElementById("sendRedBtn").addEventListener("click",async ()=>{
    if(currentChatType!=="private"||!currentChatTarget){alert("请先打开私聊");return;}
    let amt=prompt("输入RYTC红包金额");
    if(!amt)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        let val=ethers.utils.parseEther(amt);
        let pid=await token.createRedPacket(val,1,false,0);
        await token.claimRedPacket(pid);
        addChatMsg(true,"<span class='redpacket-tip'>🧧 私聊红包</span>",new Date().toLocaleTimeString());
        refreshAll();
    }catch(e){alert("红包发放失败");}
});

// 群红包
document.getElementById("sendGroupRedBtn").addEventListener("click",async ()=>{
    if(currentChatType!=="group"){alert("请进入群聊");return;}
    let total=document.getElementById("redTotal").value;
    let cnt=document.getElementById("redCount").value;
    if(!total||!cnt)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        let tVal=ethers.utils.parseEther(total);
        await token.createRedPacket(tVal,parseInt(cnt),true,currentGroupId);
        addChatMsg(true,`<span class='redpacket-tip'>🧧 群红包 ${total}RYTC</span>`,new Date().toLocaleTimeString());
        refreshAll();
    }catch(e){alert("群红包失败");}
});

// 添加好友
document.getElementById("addFriendBtn").addEventListener("click",async ()=>{
    let addr=document.getElementById("friendAddr").value.trim();
    if(!addr||!userAddress)return;
    try{
        const g=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        await g.addFriend(addr);
        alert("好友添加成功");
        loadChatSession();
    }catch(e){alert("添加失败");}
});

// 聊天转账
document.getElementById("transferBtn").addEventListener("click",async ()=>{
    let to=document.getElementById("transferAddr").value.trim();
    let num=document.getElementById("transferNum").value;
    if(!to||!num)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        await token.transfer(to,ethers.utils.parseEther(num));
        alert("聊天转账成功");
        refreshAll();
    }catch(e){alert("转账失败");}
});

// 建群
document.getElementById("createGroupBtn").addEventListener("click",async ()=>{
    let name=document.getElementById("newGroupName").value.trim();
    if(!name)return;
    try{
        const g=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        let id=await g.createGroup(name);
        alert(`创建群成功 ID：${id}`);
    }catch(e){alert("建群失败");}
});

// 邀请踢出
document.getElementById("inviteUserBtn").addEventListener("click",async ()=>{
    let gid=document.getElementById("manageGid").value;
    let uaddr=document.getElementById("operateUserAddr").value.trim();
    if(!gid||!uaddr)return;
    const g=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
    await g.inviteMember(gid,uaddr);
    alert("邀请入群成功");
});
document.getElementById("kickUserBtn").addEventListener("click",async ()=>{
    let gid=document.getElementById("manageGid").value;
    let uaddr=document.getElementById("operateUserAddr").value.trim();
    if(!gid||!uaddr)return;
    const g=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
    await g.kickMember(gid,uaddr);
    alert("移出成员成功");
});
</script>
</body>
</html>
