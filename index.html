<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RYTC DeFi 平台</title>
<script src="https://cdn.ethers.org/lib-ethers.6.13.0.umd.min.js"></script>
<style>
box-sizing:border-box;margin:0;padding:15px;
button{padding:8px 16px;margin:5px;cursor:pointer}
input{padding:8px;margin:5px;width:220px}
</style>
</head>
<body>
<h2>RYTC BSC全套DeFi系统</h2>
<button id="connectWallet">连接BSC钱包</button>
<p id="walletAddr">未连接钱包</p>

<div>
<h3>DEX代币兑换</h3>
<input placeholder="兑换数量" id="swapNum">
<button id="swapBtn">立即兑换</button>
</div>

<div>
<h3>农场LP质押挖矿</h3>
<input placeholder="质押数量" id="farmNum">
<button id="farmStake">质押挖矿</button>
<button id="farmUnStake">提取资产</button>
</div>

<div>
<h3>公会绑定&分红</h3>
<input placeholder="上级钱包地址" id="inviteAddr">
<button id="bindInv">绑定邀请关系</button>
</div>

<div>
<h3>NFT铸造</h3>
<button id="mintNft">铸造RYTC专属NFT</button>
</div>

<script>
let provider,signer;
const connectBtn = document.getElementById('connectWallet');
connectBtn.onclick = async()=>{
    if(!window.ethereum)return alert('请安装小狐狸钱包');
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer = await provider.getSigner();
    document.getElementById('walletAddr').innerText = `已连接：${await signer.address}`;
}
//基础交互占位，部署合约后填入对应合约地址即可对接功能
document.getElementById('swapBtn').onclick=()=>alert('DEX兑换功能，填入合约地址生效');
document.getElementById('farmStake').onclick=()=>alert('农场质押功能已就绪');
document.getElementById('bindInv').onclick=()=>alert('公会绑定提交成功');
document.getElementById('mintNft').onclick=()=>alert('NFT铸造发起');
</script>
</body>
</html>
