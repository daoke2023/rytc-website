<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链上社交聊天 H5版</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei;}
body{background:#f5f5f5;}
.container{display:flex;width:1200px;height:700px;margin:30px auto;background:#fff;border-radius:8px;box-shadow:0 0 15px #ccc;overflow:hidden;}
.sidebar{width:280px;background:#2e3238;color:#fff;}
.user-info{padding:15px;border-bottom:1px solid #44484e;}
.addr-text{font-size:12px;color:#ccc;word-break:break-all;margin:5px 0;}
.balance-text{color:#67c23a;margin:8px 0;}
.connect-btn{padding:6px 12px;background:#409eff;border:none;border-radius:4px;color:#fff;cursor:pointer;}
.tab-box{display:flex;border-bottom:1px solid #44484e;}
.tab-item{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px;}
.tab-item.active{background:#409eff;}
.session-list{height:420px;overflow-y:auto;}
.session-item{padding:12px 15px;border-bottom:1px solid #44484e;cursor:pointer;}
.session-item:hover,.session-item.active{background:#3a3f47;}
.session-name{font-size:14px;margin-bottom:3px;}
.session-desc{font-size:12px;color:#aaa;}
.chat-main{flex:1;display:flex;flex-direction:column;}
.chat-header{height:50px;line-height:50px;padding:0 20px;border-bottom:1px solid #eee;font-size:16px;font-weight:bold;}
.chat-content{flex:1;padding:20px;overflow-y:auto;background:#f7f7f7;}
.msg-row{margin:12px 0;display:flex;}
.msg-self{justify-content:flex-end;}
.msg-box{max-width:60%;padding:10px 15px;border-radius:6px;}
.msg-other{background:#fff;border:1px solid #eee;}
.msg-self-box{background:#95ec69;color:#333;}
.msg-time{font-size:11px;color:#999;margin-top:5px;text-align:right;}
.redpacket-tip{color:red;font-weight:bold;cursor:pointer;}
.chat-input{height:120px;border-top:1px solid #eee;padding:15px;}
.input-area{width:100%;height:60px;border:1px solid #ddd;border-radius:4px;padding:8px;resize:none;outline:none;}
.send-btn{margin-top:8px;padding:6px 18px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer;float:right;margin-left:8px;}
.func-panel{width:320px;border-left:1px solid #eee;padding:15px;overflow-y:auto;}
.func-title{font-size:15px;font-weight:bold;margin:15px 0 8px;padding-bottom:5px;border-bottom:1px solid #eee;}
input,textarea{width:100%;padding:8px;margin:6px 0;border:1px solid #ddd;border-radius:4px;}
button{padding:7px 12px;margin:4px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer;}
.btn-group{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
@media (max-width: 900px){
    .container{flex-direction:column;width:100%;height:auto;margin:0;}
    .sidebar,.chat-main,.func-panel{width:100%;height:auto;}
    .session-list{height:200px;}
    .chat-content{height:300px;}
}
</style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="user-info">
            <button class="connect-btn" id="connectBtn">连接钱包登录</button>
            <div class="addr-text" id="userAddr">未登录钱包</div>
            <div class="balance-text" id="tokenBalance">RYTC：0</div>
        </div>
        <div class="tab-box">
            <div class="tab-item active" data-type="private">私聊</div>
            <div class="tab-item" data-type="group">群聊</div>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>
    <div class="chat-main">
        <div class="chat-header" id="chatTitle">选择会话开始聊天</div>
        <div class="chat-content" id="chatBox"></div>
        <div class="chat-input">
            <textarea class="input-area" id="msgInput" placeholder="输入消息..."></textarea>
            <button class="send-btn" id="sendMsgBtn">发送</button>
            <button class="send-btn" id="sendRedBtn" style="background:red;">发红包</button>
        </div>
    </div>
    <div class="func-panel">
        <div class="func-title">添加好友</div>
        <input type="text" id="friendAddr" placeholder="对方钱包地址">
        <button id="addFriendBtn">添加好友</button>
        <div class="func-title">钱包转账</div>
        <input type="text" id="transferAddr" placeholder="对方地址（选会话自动填）">
        <input type="number" id="transferNum" placeholder="转账数量">
        <button id="transferBtn">确认转账</button>
        <div class="func-title">群红包设置</div>
        <input type="number" id="redTotal" placeholder="红包总额">
        <input type="number" id="redCount" placeholder="红包个数">
        <button id="sendGroupRedBtn">发群红包</button>
        <div class="func-title">群组管理</div>
        <input type="text" id="newGroupName" placeholder="新建群组名称">
        <button id="createGroupBtn">创建群组</button>
        <div class="btn-group">
            <input type="number" id="manageGid" placeholder="群组ID">
            <input type="text" id="operateUserAddr" placeholder="成员地址">
        </div>
        <div class="btn-group">
            <button id="inviteUserBtn">邀请入群</button>
            <button id="kickUserBtn">踢出成员</button>
        </div>
        <div class="func-title">代币兑换</div>
        <input type="number" id="buyMaticNum" placeholder="支付MATIC数量">
        <button id="buyTokenBtn">兑换RYTC</button>
    </div>
</div>

<script>
// 替换为自己部署的合约地址
const TOKEN_ADDR = "";
const GROUP_ADDR = "";
const BUY_ADDR = "";

const TOKEN_ABI = [
    "function balanceOf(address) view returns(uint256)",
    "function transfer(address,uint256) returns(bool)",
    "function createRedPacket(uint256,uint256,bool,uint256) returns(bytes32)",
    "function claimRedPacket(bytes32) returns(uint256)"
];
const GROUP_ABI = [
    "function addFriend(address)",
    "function savePrivateChat(address,string)",
    "function createGroup(string) returns(uint256)",
    "function inviteMember(uint256,address)",
    "function kickMember(uint256,address)",
    "function sendGroupChat(uint256,string)",
    "function friends(address) view returns(address[])"
];
const BUY_ABI = ["function buyToken() payable"];

let provider,signer,userAddress;
let currentChatType="private",currentChatTarget="",currentGroupId="";
let chatCache=JSON.parse(localStorage.getItem("chatCache"))||{};

document.getElementById("connectBtn").addEventListener("click",async ()=>{
    if(!window.ethereum)return alert("请安装MetaMask钱包");
    provider=new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer=provider.getSigner();
    userAddress=await signer.getAddress();
    document.getElementById("userAddr").innerText=userAddress;
    getBalance();
    loadSessions();
});

async function getBalance(){
    const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,provider);
    let bal=await token.balanceOf(userAddress);
    bal=ethers.utils.formatEther(bal);
    document.getElementById("tokenBalance").innerText=`RYTC：${bal}`;
}

document.querySelectorAll(".tab-item").forEach(tab=>{
    tab.addEventListener("click",function(){
        document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));
        this.classList.add("active");
        currentChatType=this.dataset.type;
        loadSessions();
    });
});

async function loadSessions(){
    const list=document.getElementById("sessionList");
    list.innerHTML="";
    if(currentChatType==="private"){
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,provider);
        const fs=await group.friends(userAddress);
        fs.forEach(addr=>{
            const item=document.createElement("div");
            item.className="session-item";
            item.innerHTML=`<div class="session-name">${addr.slice(0,10)}...</div><div class="session-desc">私聊会话</div>`;
            item.onclick=()=>openPrivateChat(addr);
            list.appendChild(item);
        });
    }else{
        const item=document.createElement("div");
        item.className="session-item";
        item.innerHTML=`<div class="session-name">默认群聊</div><div class="session-desc">点击进入聊天</div>`;
        item.onclick=()=>openGroupChat(0,"默认群聊");
        list.appendChild(item);
    }
}

function openPrivateChat(addr){
    currentChatType="private";
    currentChatTarget=addr;
    currentGroupId="";
    document.getElementById("chatTitle").innerText=`私聊：${addr.slice(0,10)}...`;
    document.getElementById("transferAddr").value=addr;
    loadChatCache();
}

function openGroupChat(gid,name){
    currentChatType="group";
    currentChatTarget="";
    currentGroupId=gid;
    document.getElementById("chatTitle").innerText=`群聊：${name}`;
    loadChatCache();
}

function saveChatCache(){
    localStorage.setItem("chatCache",JSON.stringify(chatCache));
}
function loadChatCache(){
    const key=currentChatType==="private"?currentChatTarget:`group_${currentGroupId}`;
    document.getElementById("chatBox").innerHTML=chatCache[key]||"";
}
function appendMsg(isSelf,content,time){
    const key=currentChatType==="private"?currentChatTarget:`group_${currentGroupId}`;
    const row=document.createElement("div");
    row.className=`msg-row ${isSelf?'msg-self':''}`;
    row.innerHTML=`<div class="msg-box ${isSelf?'msg-self-box':'msg-other'}">${content}<div class="msg-time">${time}</div></div>`;
    document.getElementById("chatBox").appendChild(row);
    chatCache[key]=(chatCache[key]||"")+row.outerHTML;
    saveChatCache();
    document.getElementById("chatBox").scrollTop=document.getElementById("chatBox").scrollHeight;
}

document.getElementById("sendMsgBtn").addEventListener("click",async ()=>{
    const msg=document.getElementById("msgInput").value.trim();
    if(!msg)return;
    const time=new Date().toLocaleTimeString();
    appendMsg(true,msg,time);
    document.getElementById("msgInput").value="";
    try{
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        if(currentChatType==="private")await group.savePrivateChat(currentChatTarget,msg);
        else await group.sendGroupChat(currentGroupId,msg);
    }catch(e){alert("发送失败："+e.message);}
});

document.getElementById("sendRedBtn").addEventListener("click",async ()=>{
    if(currentChatType!=="private"||!currentChatTarget)return alert("请先打开私聊会话");
    const amt=prompt("红包金额(RYTC)：");
    const cnt=1;
    if(!amt)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        const amount=ethers.utils.parseEther(amt);
        const packetId=await token.createRedPacket(amount,cnt,false,0);
        await token.claimRedPacket(packetId);
        appendMsg(true,`<span class="redpacket-tip">🧧 私聊红包 ${amt} RYTC</span>`,new Date().toLocaleTimeString());
        getBalance();
    }catch(e){alert("红包失败："+e.message);}
});

document.getElementById("sendGroupRedBtn").addEventListener("click",async ()=>{
    if(currentChatType!=="group")return alert("请先打开群聊");
    const total=document.getElementById("redTotal").value;
    const cnt=document.getElementById("redCount").value;
    if(!total||!cnt)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        const totalAmt=ethers.utils.parseEther(total);
        const packetId=await token.createRedPacket(totalAmt,parseInt(cnt),true,currentGroupId);
        appendMsg(true,`<span class="redpacket-tip">🧧 群红包 ${total} RYTC 共${cnt}个</span>`,new Date().toLocaleTimeString());
        getBalance();
    }catch(e){alert("群红包失败："+e.message);}
});

document.getElementById("addFriendBtn").addEventListener("click",async ()=>{
    const addr=document.getElementById("friendAddr").value.trim();
    if(!addr)return;
    try{
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        await group.addFriend(addr);
        alert("添加好友成功");
        loadSessions();
    }catch(e){alert("添加失败："+e.message);}
});

document.getElementById("transferBtn").addEventListener("click",async ()=>{
    const to=document.getElementById("transferAddr").value.trim();
    const num=document.getElementById("transferNum").value;
    if(!to||!num)return;
    try{
        const token=new ethers.Contract(TOKEN_ADDR,TOKEN_ABI,signer);
        const amt=ethers.utils.parseEther(num);
        await token.transfer(to,amt);
        alert("转账成功");
        getBalance();
    }catch(e){alert("转账失败："+e.message);}
});

document.getElementById("createGroupBtn").addEventListener("click",async ()=>{
    const name=document.getElementById("newGroupName").value.trim();
    if(!name)return;
    try{
        const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
        const gid=await group.createGroup(name);
        alert(`建群成功，群组ID：${gid}`);
    }catch(e){alert("建群失败："+e.message);}
});

document.getElementById("inviteUserBtn").addEventListener("click",async ()=>{
    const gid=document.getElementById("manageGid").value;
    const addr=document.getElementById("operateUserAddr").value.trim();
    if(!gid||!addr)return;
    const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
    await group.inviteMember(gid,addr);
    alert("邀请入群成功");
});
document.getElementById("kickUserBtn").addEventListener("click",async ()=>{
    const gid=document.getElementById("manageGid").value;
    const addr=document.getElementById("operateUserAddr").value.trim();
    if(!gid||!addr)return;
    const group=new ethers.Contract(GROUP_ADDR,GROUP_ABI,signer);
    await group.kickMember(gid,addr);
    alert("成员已移出群组");
});

document.getElementById("buyTokenBtn").addEventListener("click",async ()=>{
    const num=document.getElementById("buyMaticNum").value;
    if(!num)return;
    const buy=new ethers.Contract(BUY_ADDR,BUY_ABI,signer);
    const val=ethers.utils.parseEther(num);
    await buy.buyToken({value:val});
    alert("代币兑换成功");
    getBalance();
});
</script>
</body>
</html>
